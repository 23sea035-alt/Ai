<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Aura AI - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#004d67",
                    "tertiary-container": "#d57a1e",
                    "outline-variant": "#484555",
                    "on-secondary": "#003548",
                    "surface-gradient-end": "#1A1F4B",
                    "error": "#ffb4ab",
                    "on-primary-container": "#28008a",
                    "on-primary-fixed": "#1a0063",
                    "secondary-fixed": "#c2e8ff",
                    "surface-container": "#1a1f30",
                    "on-background": "#dee1f9",
                    "glass-fill": "rgba(255, 255, 255, 0.04)",
                    "surface-container-lowest": "#080d1d",
                    "primary-fixed": "#e5deff",
                    "secondary-fixed-dim": "#75d1ff",
                    "primary-fixed-dim": "#c9bfff",
                    "tertiary": "#ffb77d",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "background": "#0e1323",
                    "surface-variant": "#2f3446",
                    "on-tertiary-container": "#432100",
                    "surface-gradient-start": "#0B1020",
                    "surface": "#0e1323",
                    "surface-container-high": "#25293a",
                    "error-container": "#93000a",
                    "on-tertiary-fixed": "#2f1500",
                    "glass-stroke": "rgba(255, 255, 255, 0.12)",
                    "inverse-primary": "#5d3fe0",
                    "surface-dim": "#0e1323",
                    "primary-container": "#917eff",
                    "surface-tint": "#c9bfff",
                    "accent-glow": "#B388FF",
                    "tertiary-fixed": "#ffdcc3",
                    "secondary-container": "#00c1fd",
                    "surface-gradient-mid": "#121A35",
                    "surface-bright": "#34394a",
                    "on-secondary-container": "#004b65",
                    "inverse-surface": "#dee1f9",
                    "surface-container-low": "#161b2b",
                    "primary": "#c9bfff",
                    "secondary": "#8fd8ff",
                    "on-secondary-fixed": "#001e2b",
                    "on-primary-fixed-variant": "#441cc8",
                    "on-surface-variant": "#c9c4d8",
                    "on-tertiary": "#4d2600",
                    "outline": "#928ea1",
                    "on-surface": "#dee1f9",
                    "tertiary-fixed-dim": "#ffb77d",
                    "on-primary": "#2e009c",
                    "inverse-on-surface": "#2b3041",
                    "on-error-container": "#ffdad6",
                    "on-error": "#690005",
                    "surface-container-highest": "#2f3446"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {
                    "gutter": "16px",

            "fontFamily": {

                    "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

      }

<style>
        body {
            background: radial-gradient(circle at top right, #1A1F4B, #0e1323), radial-gradient(circle at bottom left, #0B1020, #0e1323);
            background-color: #0e1323;
            overflow: hidden;
            height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .aura-btn {
            background: linear-gradient(135deg, #c9bfff 0%, #8fd8ff 100%);
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.3);
            transition: all 0.3s ease;
        }

        .aura-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.5);
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(20vw); opacity: 0; }
        }

        .orb-blur {
            filter: blur(80px);
            z-index: -1;
        }

        .border-flow {
            position: relative;
            overflow: hidden;
        }
        
        .border-flow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, transparent, rgba(179, 136, 255, 0.8), transparent);
            animation: flow 3s linear infinite;
            z-index: -1;
        }

        @keyframes flow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        input:focus + label, input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #c9bfff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center font-body-md text-on-background selection:bg-primary selection:text-on-primary">
<!-- Particle Background -->
<div class="fixed inset-0 overflow-hidden" id="particle-container"></div>
<!-- Ambient Glow Orbs -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/20 rounded-full orb-blur animate-pulse"></div>
<div class="fixed bottom-[-15%] left-[-15%] w-[600px] h-[600px] bg-secondary/15 rounded-full orb-blur" style="animation-delay: 2s;"></div>
<main class="relative z-10 w-full max-w-[390px] px-container-margin h-screen flex flex-col justify-center items-center">
<!-- Header / Logo Area -->
<header class="mb-stack-lg text-center animate-in fade-in slide-in-from-bottom-4 duration-1000">
<div class="relative inline-block mb-4">
<div class="w-20 h-20 glass-card rounded-full flex items-center justify-center p-4">
<div class="w-full h-full rounded-full bg-gradient-to-br from-primary to-secondary animate-pulse opacity-80"></div>
</div>
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full -z-10 animate-pulse"></div>
</div>
<h1 class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Aura AI</h1>
<p class="font-caption text-caption text-outline mt-2 tracking-wide uppercase">Luminous Intelligence</p>
</header>
<!-- Login Card -->
<section class="glass-card w-full rounded-[32px] p-8 animate-in fade-in zoom-in-95 duration-700">
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="relative">
<div class="flex items-center glass-card rounded-2xl bg-white/[0.02] border-white/[0.08] px-4 h-14 transition-all focus-within:border-primary/50 focus-within:ring-1 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-outline mr-3">alternate_email</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder-transparent focus:ring-0" id="email" placeholder=" " type="email"/>
<label class="absolute left-12 top-1/2 -translate-y-1/2 text-outline pointer-events-none transition-all duration-200 origin-left" for="email">Email Address</label>
</div>
</div>
<!-- Password Field -->
<div class="relative">
<div class="flex items-center glass-card rounded-2xl bg-white/[0.02] border-white/[0.08] px-4 h-14 transition-all focus-within:border-primary/50 focus-within:ring-1 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-outline mr-3">lock</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface font-body-md placeholder-transparent focus:ring-0" id="password" placeholder=" " type="password"/>
<label class="absolute left-12 top-1/2 -translate-y-1/2 text-outline pointer-events-none transition-all duration-200 origin-left" for="password">Password</label>
<button class="material-symbols-outlined text-outline hover:text-primary transition-colors" type="button">visibility</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="aura-btn w-full h-14 rounded-2xl text-on-primary font-title-md font-bold transition-all active:scale-95 flex items-center justify-center gap-2 group">
                        Login
                        <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
<!-- Links -->
<div class="flex flex-col items-center gap-stack-sm pt-2">
<a class="text-caption text-outline hover:text-primary transition-colors" href="#">Forgot Password?</a>
<div class="flex items-center gap-2 w-full px-4">
<div class="h-[1px] flex-1 bg-white/[0.05]"></div>
<span class="text-label-caps text-outline opacity-50">OR</span>
<div class="h-[1px] flex-1 bg-white/[0.05]"></div>
</div>
<p class="text-body-md text-outline">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Sign Up</a>
</p>
</div>
</form>
</section>
<!-- Biometric Hint -->
<footer class="mt-stack-lg animate-in fade-in duration-1000 delay-500">
<button class="flex flex-col items-center gap-2 text-outline/60 hover:text-primary transition-all">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 0;">fingerprint</span>
<span class="text-label-caps text-[10px] tracking-widest">TAP FOR BIOMETRICS</span>
</button>
</footer>
</main>
<script>
        // Generate ambient particles
        const container = document.getElementById('particle-container');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 3 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            
            const duration = Math.random() * 10 + 15;
            const delay = Math.random() * 20;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${delay}s`;
            
            container.appendChild(particle);
        }

        // Simple button interaction
        const loginBtn = document.querySelector('.aura-btn');
        loginBtn.addEventListener('click', () => {
            loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Connecting...';
            setTimeout(() => {
                loginBtn.innerHTML = 'Login <span class="material-symbols-outlined">arrow_forward</span>';
            }, 2000);
        });

        // Add visual interest to inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-[0_0_15px_rgba(179,136,255,0.1)]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-[0_0_15px_rgba(179,136,255,0.1)]');
            });
        });
    </script>
</body></html>
