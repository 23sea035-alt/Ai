<style>
        body {
            background: radial-gradient(circle at top center, #1A1F4B 0%, #0e1323 100%);
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        .aura-orb-container {
            perspective: 1000px;
        }
        .aura-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--orb-color, #c9bfff), transparent 70%);
            filter: blur(2px);
            box-shadow: 0 0 40px 10px rgba(179, 136, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.4);
            animation: breathe 4s ease-in-out infinite;
            transition: background 1s ease, box-shadow 1s ease;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); opacity: 0.8; }
            50% { transform: scale(1.08) translateY(-10px); opacity: 1; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .aura-button-gradient {
            background: linear-gradient(135deg, #c9bfff 0%, #8fd8ff 100%);
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .trait-active {
            background: rgba(201, 191, 255, 0.2) !important;
            border-color: #c9bfff !important;
            box-shadow: 0 0 15px rgba(201, 191, 255, 0.3);
        }
        ::-webkit-scrollbar { display: none; }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-md min-h-screen flex flex-col">

    <!-- Top AppBar (Predicted Component) -->
    <nav class="fixed top-0 w-full bg-glass-fill backdrop-blur-xl border-b border-glass-stroke shadow-[0_0_30px_rgba(179,136,255,0.2)] flex items-center justify-between px-container-margin h-16 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary to-secondary flex items-center justify-center">
                <span class="material-symbols-outlined text-on-primary text-[18px]">auto_awesome</span>
            </div>
            <span class="font-headline-lg-mobile text-headline-lg-mobile bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Aura AI</span>
        </div>
        <button class="w-10 h-10 flex items-center justify-center text-primary active:scale-95 transition-transform">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </nav>

    <!-- Main Content Canvas -->
    <main class="flex-1 mt-16 px-container-margin pb-32 overflow-y-auto">
        
        <!-- Wizard Progress -->
        <div class="mt-8 flex justify-between items-center gap-2 mb-8">
            <div class="h-1 flex-1 bg-primary rounded-full"></div>
            <div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
            <div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
        </div>

        <!-- Live Preview Orb Area -->
        <section class="aura-orb-container flex flex-col items-center justify-center py-8">
            <div id="orb" class="aura-orb"></div>
            <div class="mt-6 text-center">
                <h2 id="preview-name" class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Untitled</h2>
                <p class="font-label-caps text-label-caps text-outline uppercase tracking-widest mt-1">Ready for initialization</p>
            </div>
        </section>

        <!-- Step 1 Form -->
        <section class="space-y-stack-md mt-4">
            <header>
                <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Genesis Phase</h1>
                <p class="font-body-md text-on-surface-variant">Define the core essence of your AI companion.</p>
            </header>

            <!-- Name Input -->
            <div class="space-y-base">
                <label class="font-label-caps text-label-caps text-primary px-1">IDENTIFIER</label>
                <div class="glass-card rounded-xl p-1 focus-within:border-primary transition-all group">
                    <input 
                        type="text" 
                        id="name-input"
                        placeholder="Enter companion name..."
                        class="w-full bg-transparent border-none focus:ring-0 text-title-md font-title-md text-on-surface py-3 px-4 placeholder:text-outline/50"
                    >
                </div>
            </div>

            <!-- Personality Grid -->
            <div class="space-y-base">
                <label class="font-label-caps text-label-caps text-primary px-1">CORE ARCHETYPE</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectTrait('Logical', '#8fd8ff', this)" class="trait-btn glass-card p-4 rounded-xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-secondary">psychology</span>
                        <span class="font-title-md text-on-surface">Logical</span>
                        <p class="font-caption text-caption text-on-surface-variant text-left">Fact-driven, precise, and analytical.</p>
                    </button>
                    <button onclick="selectTrait('Empathetic', '#c9bfff', this)" class="trait-btn glass-card p-4 rounded-xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-primary">favorite</span>
                        <span class="font-title-md text-on-surface">Empathetic</span>
                        <p class="font-caption text-caption text-on-surface-variant text-left">Nurturing, supportive, and warm.</p>
                    </button>
                    <button onclick="selectTrait('Creative', '#ffb77d', this)" class="trait-btn glass-card p-4 rounded-xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-tertiary">palette</span>
                        <span class="font-title-md text-on-surface">Creative</span>
                        <p class="font-caption text-caption text-on-surface-variant text-left">Abstract, imaginative, and bold.</p>
                    </button>
                    <button onclick="selectTrait('Witty', '#e5deff', this)" class="trait-btn glass-card p-4 rounded-xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-primary-fixed">mood</span>
                        <span class="font-title-md text-on-surface">Witty</span>
                        <p class="font-caption text-caption text-on-surface-variant text-left">Sharp, humerous, and playful.</p>
                    </button>
                </div>
            </div>
        </section>

        <!-- CTA Area -->
        <div class="fixed bottom-0 left-0 w-full p-container-margin bg-gradient-to-t from-background via-background/95 to-transparent pt-12">
            <button class="aura-button-gradient w-full h-14 rounded-full flex items-center justify-center gap-2 text-on-primary font-title-md transition-all active:scale-95">
                <span>Continue to Voice Mapping</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>
    </main>

    <script>
        const nameInput = document.getElementById('name-input');
        const previewName = document.getElementById('preview-name');
        const orb = document.getElementById('orb');

        // Dynamic Name Preview
        nameInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            previewName.textContent = val || 'Untitled';
        });

        // Trait Selection Logic
        function selectTrait(trait, color, element) {
            // Reset all buttons
            document.querySelectorAll('.trait-btn').forEach(btn => {
                btn.classList.remove('trait-active');
            });
            
            // Highlight selected
            element.classList.add('trait-active');

            // Update Orb Styling
            orb.style.setProperty('--orb-color', color);
            orb.style.boxShadow = `0 0 60px 20px ${color}4d, inset 0 0 30px rgba(255, 255, 255, 0.5)`;
            
            // Haptic-like interaction feel
            orb.animate([
                { transform: 'scale(1)', filter: 'brightness(1)' },
                { transform: 'scale(1.15)', filter: 'brightness(1.5)' },
                { transform: 'scale(1.08)', filter: 'brightness(1)' }
            ], {
                duration: 600,
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)'
            });
        }

        // Initialize default selection
        window.onload = () => {
            const firstBtn = document.querySelector('.trait-btn');
            if(firstBtn) firstBtn.click();
        };
    </script>
</body>
</html></style><style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
