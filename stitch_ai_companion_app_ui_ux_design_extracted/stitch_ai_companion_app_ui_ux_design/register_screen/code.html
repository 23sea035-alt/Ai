<style>
    body {
      background: radial-gradient(circle at 50% 50%, #121A35 0%, #0e1323 100%);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .aura-gradient-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, #0e1323 0%, #1A1F4B 50%, #0e1323 100%);
    }

    .aura-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: drift 20s infinite alternate ease-in-out;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20%, 30%) scale(1.2); }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .aura-button-glow {
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(179, 136, 255, 0.3);
      transition: all 0.3s ease;
    }

    .aura-button-glow:active {
      transform: scale(0.96);
      box-shadow: 0 0 10px rgba(179, 136, 255, 0.5);
    }

    .aura-button-glow::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(201, 191, 255, 0.2), transparent 30%);
      animation: rotate-border 4s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate-border {
      100% { transform: rotate(360deg); }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    input:focus {
      outline: none;
      border-color: #c9bfff !important;
      box-shadow: 0 0 0 1px rgba(201, 191, 255, 0.2);
    }

    /* iOS 16 Pro Safe Area Padding */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface font-body-md">
<!-- Atmospheric Background -->
<div class="aura-gradient-bg"></div>
<div class="aura-orb w-[400px] h-[400px] bg-primary top-[-10%] left-[-10%]"></div>
<div class="aura-orb w-[350px] h-[350px] bg-secondary bottom-[-5%] right-[-5%]"></div>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin safe-top safe-bottom relative z-10">
<!-- Branding Header -->
<div class="text-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="inline-flex items-center justify-center w-16 h-16 mb-4 rounded-full glass-card border-primary/20">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-display-lg text-headline-lg-mobile bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent mb-2">
        Aura AI
      </h1>
<p class="text-on-surface-variant font-body-md opacity-80">Experience Luminous Intelligence</p>
</div>
<!-- Registration Container -->
<section class="w-full max-w-sm glass-card rounded-[2rem] p-stack-md animate-in fade-in zoom-in-95 duration-1000 delay-150">
<form class="space-y-4">
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">person</span>
<input class="w-full h-14 bg-surface-container-lowest/40 border border-glass-stroke rounded-xl pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all" placeholder="Alex Rivera" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">mail</span>
<input class="w-full h-14 bg-surface-container-lowest/40 border border-glass-stroke rounded-xl pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all" placeholder="alex@aura.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">lock</span>
<input class="w-full h-14 bg-surface-container-lowest/40 border border-glass-stroke rounded-xl pl-11 pr-12 text-on-surface placeholder:text-outline/50 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline ml-1">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm">verified_user</span>
<input class="w-full h-14 bg-surface-container-lowest/40 border border-glass-stroke rounded-xl pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Face ID Toggle -->
<div class="flex items-center justify-between px-1 py-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">face</span>
<span class="font-body-md text-on-surface/90">Enable Face ID</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-variant rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Submit Button -->
<button class="w-full h-14 aura-button-glow bg-gradient-to-r from-primary to-secondary rounded-xl font-headline-lg-mobile text-on-primary flex items-center justify-center gap-2 group mt-6" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center space-y-4">
<p class="font-caption text-outline">
          Already have an account? 
          <a class="text-primary hover:text-secondary transition-colors font-semibold" href="#">Sign In</a>
</p>
<div class="flex items-center gap-4 py-2">
<div class="h-px flex-1 bg-glass-stroke"></div>
<span class="font-label-caps text-[10px] text-outline uppercase tracking-widest">Or Register With</span>
<div class="h-px flex-1 bg-glass-stroke"></div>
</div>
<div class="flex justify-center gap-4">
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all">
<svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path></svg>
</button>
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all">
<svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24"><path d="M17.05 20.28c-.96.95-2.05 1.78-3.72 1.78-1.58 0-2.12-1-3.71-1-1.59 0-2.24 1-3.67 1-1.5 0-2.81-1.07-3.9-2.64-2.23-3.21-1.71-8.32 1.07-11.37C4.43 5.48 5.76 4.67 7.21 4.67c1.37 0 2.22.82 3.33.82 1.12 0 1.77-.82 3.4-.82 1.33 0 2.5.67 3.33 1.83-2.84 1.71-2.38 5.56.5 6.78-.8 1.95-1.85 3.86-2.72 5zM12.01 4.54c-.03-1.92 1.58-3.56 3.44-3.54.19 1.99-1.81 3.69-3.44 3.54z"></path></svg>
</button>
</div>
</div>
</section>
<!-- App Identity Bottom Anchor -->
<div class="mt-stack-lg animate-pulse">
<span class="font-label-caps text-label-caps text-primary/40 tracking-[0.3em]">ENCRYPTED WITH NEURAL TRUST</span>
</div>
</main>
<script>
    // Lightweight atmospheric micro-interaction
    document.addEventListener('mousemove', (e) => {
      const orbs = document.querySelectorAll('.aura-orb');
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      orbs.forEach((orb, index) => {
        const factor = (index + 1) * 20;
        orb.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
      });
    });

    // Touch interaction for button
    const btn = document.querySelector('.aura-button-glow');
    btn.addEventListener('touchstart', () => {
      btn.classList.add('scale-95');
    });
    btn.addEventListener('touchend', () => {
      btn.classList.remove('scale-95');
    });
  </script>
</body></html>
