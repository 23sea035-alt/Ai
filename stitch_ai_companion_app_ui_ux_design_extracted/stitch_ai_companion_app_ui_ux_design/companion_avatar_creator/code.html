<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Aura AI - Persona Creator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background: radial-gradient(circle at top center, #1A1F4B 0%, #0e1323 100%);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .aura-glow {
            filter: drop-shadow(0 0 30px rgba(179, 136, 255, 0.4));
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #c9bfff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(179, 136, 255, 0.8);
        }
        .slider-thumb::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #c9bfff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(179, 136, 255, 0.8);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes rotate-border {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .border-flow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: conic-gradient(from 0deg, transparent, #c9bfff, transparent, #8fd8ff, transparent);
            border-radius: inherit;
            z-index: -1;
            animation: rotate-border 4s linear infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e5deff",
                        "surface-gradient-end": "#1A1F4B",
                        "surface-container": "#1a1f30",
                        "primary-fixed-dim": "#c9bfff",
                        "tertiary-fixed": "#ffdcc3",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-primary-container": "#28008a",
                        "on-primary-fixed-variant": "#441cc8",
                        "outline": "#928ea1",
                        "on-tertiary-fixed": "#2f1500",
                        "glass-stroke": "rgba(255, 255, 255, 0.12)",
                        "secondary-container": "#00c1fd",
                        "inverse-primary": "#5d3fe0",
                        "tertiary": "#ffb77d",
                        "surface-variant": "#2f3446",
                        "on-secondary-fixed": "#001e2b",
                        "surface-gradient-start": "#0B1020",
                        "on-primary-fixed": "#1a0063",
                        "primary": "#c9bfff",
                        "tertiary-container": "#d57a1e",
                        "surface-container-low": "#161b2b",
                        "secondary-fixed-dim": "#75d1ff",
                        "on-secondary": "#003548",
                        "on-secondary-container": "#004b65",
                        "surface-dim": "#0e1323",
                        "surface-container-lowest": "#080d1d",
                        "surface-gradient-mid": "#121A35",
                        "surface-container-high": "#25293a",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "inverse-on-surface": "#2b3041",
                        "on-error-container": "#ffdad6",
                        "glass-fill": "rgba(255, 255, 255, 0.04)",
                        "on-background": "#dee1f9",
                        "error": "#ffb4ab",
                        "on-primary": "#2e009c",
                        "surface-container-highest": "#2f3446",
                        "accent-glow": "#B388FF",
                        "background": "#0e1323",
                        "secondary": "#8fd8ff",
                        "on-error": "#690005",
                        "surface-tint": "#c9bfff",
                        "on-tertiary-container": "#432100",
                        "on-secondary-fixed-variant": "#004d67",
                        "surface-bright": "#34394a",
                        "surface": "#0e1323",
                        "secondary-fixed": "#c2e8ff",
                        "inverse-surface": "#dee1f9",
                        "on-surface-variant": "#c9c4d8",
                        "on-surface": "#dee1f9",
                        "primary-container": "#917eff",
                        "outline-variant": "#484555",
                        "on-tertiary": "#4d2600"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-md": "24px",
                        "stack-sm": "12px",
                        "stack-lg": "40px",
                        "gutter": "16px",
                        "container-margin": "20px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "display-lg": ["Sora"],
                        "title-md": ["Sora"],
                        "headline-lg-mobile": ["Sora"],
                        "body-md": ["Manrope"],
                        "headline-lg": ["Sora"],
                        "body-lg": ["Manrope"],
                        "caption": ["Manrope"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["17px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "caption": ["13px", {"lineHeight": "18px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface antialiased">
<!-- Top App Bar -->
<header class="fixed top-0 w-full bg-glass-fill backdrop-blur-xl border-b border-glass-stroke shadow-[0_0_30px_rgba(179,136,255,0.2)] flex items-center justify-between px-container-margin h-16 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center aura-glow">
<span class="material-symbols-outlined text-on-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Aura AI</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary text-[24px]">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-container-margin">
<!-- 3D Avatar Stage -->
<section class="relative w-full aspect-[4/5] flex items-center justify-center mb-8">
<!-- Ambient Glow Behind Persona -->
<div class="absolute w-64 h-64 bg-primary/20 rounded-full blur-[60px] animate-pulse"></div>
<!-- Persona Orb / Avatar Container -->
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<div class="w-64 h-64 md:w-80 md:h-80 rounded-full glass-card border-glow animate-float flex items-center justify-center overflow-hidden">

<div class="absolute inset-0 bg-gradient-to-t from-primary/30 to-transparent mix-blend-overlay"></div>
</div>
<!-- Interaction Badge -->
<div class="mt-8 glass-card px-4 py-2 rounded-full border border-primary/30 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-ping"></span>
<span class="font-label-caps text-label-caps text-primary">AURORA ACTIVE</span>
</div>
</div>
<!-- Floating Action Islands -->
<div class="absolute top-4 right-0 flex flex-col gap-3">
<button class="w-12 h-12 glass-card rounded-full flex items-center justify-center text-primary shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-12 h-12 glass-card rounded-full flex items-center justify-center text-primary shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined">rotate_right</span>
</button>
<button class="w-12 h-12 glass-card rounded-full flex items-center justify-center text-primary shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined">light_mode</span>
</button>
</div>
</section>
<!-- Category Tabs -->
<nav class="flex justify-between items-center bg-surface-container-low/50 p-1 rounded-2xl glass-card mb-6">
<button class="flex-1 py-3 px-2 rounded-xl text-primary font-title-md text-[14px] bg-primary/10 border border-primary/20">Base</button>
<button class="flex-1 py-3 px-2 rounded-xl text-outline font-title-md text-[14px] hover:text-on-surface transition-colors">Style</button>
<button class="flex-1 py-3 px-2 rounded-xl text-outline font-title-md text-[14px] hover:text-on-surface transition-colors">Energy</button>
<button class="flex-1 py-3 px-2 rounded-xl text-outline font-title-md text-[14px] hover:text-on-surface transition-colors">Cosmetics</button>
</nav>
<!-- Configuration Panel -->
<div class="space-y-6">
<!-- Glow Intensity Slider -->
<div class="glass-card p-5 rounded-3xl space-y-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">flare</span>
<h3 class="font-title-md text-[16px] text-on-surface">Glow Intensity</h3>
</div>
<span class="font-label-caps text-label-caps text-secondary">84%</span>
</div>
<input class="w-full h-1.5 bg-surface-variant rounded-full appearance-none cursor-pointer slider-thumb" type="range" value="84"/>
</div>
<!-- Particle Density Slider -->
<div class="glass-card p-5 rounded-3xl space-y-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">grain</span>
<h3 class="font-title-md text-[16px] text-on-surface">Particle Density</h3>
</div>
<span class="font-label-caps text-label-caps text-secondary">42%</span>
</div>
<input class="w-full h-1.5 bg-surface-variant rounded-full appearance-none cursor-pointer slider-thumb" type="range" value="42"/>
</div>
<!-- Color Presets -->
<div class="grid grid-cols-4 gap-4">
<button class="aspect-square rounded-2xl bg-gradient-to-br from-[#B388FF] to-[#673AB7] ring-2 ring-primary ring-offset-4 ring-offset-background"></button>
<button class="aspect-square rounded-2xl bg-gradient-to-br from-[#00c1fd] to-[#004b65]"></button>
<button class="aspect-square rounded-2xl bg-gradient-to-br from-[#ffb77d] to-[#d57a1e]"></button>
<button class="aspect-square rounded-2xl bg-gradient-to-br from-[#ffb4ab] to-[#93000a]"></button>
</div>
</div>
<!-- Call to Action -->
<div class="mt-8">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary font-headline-lg-mobile text-[18px] shadow-[0_0_20px_rgba(179,136,255,0.4)] active:scale-95 transition-all relative overflow-hidden group">
<span class="relative z-10 flex items-center justify-center gap-2">
                    Manifest Persona
                    <span class="material-symbols-outlined">auto_fix_high</span>
</span>
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"></div>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-glass-fill backdrop-blur-2xl border-t border-glass-stroke shadow-[0_-10px_40px_rgba(0,0,0,0.5)] rounded-t-xl">
<a class="flex flex-col items-center justify-center text-outline hover:text-secondary transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-[24px]">home</span>
<span class="font-label-caps text-label-caps mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-outline hover:text-secondary transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-[24px]">chat</span>
<span class="font-label-caps text-label-caps mt-1">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-primary filter drop-shadow-[0_0_8px_rgba(179,136,255,0.8)] active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps mt-1">Profile</span>
</a>
<a class="flex flex-col items-center justify-center text-outline hover:text-secondary transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-[24px]">database</span>
<span class="font-label-caps text-label-caps mt-1">Memory</span>
</a>
<a class="flex flex-col items-center justify-center text-outline hover:text-secondary transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-[24px]">workspace_premium</span>
<span class="font-label-caps text-label-caps mt-1">Premium</span>
</a>
</nav>
<script>
        // Simple micro-interaction for sliders
        const sliders = document.querySelectorAll('.slider-thumb');
        sliders.forEach(slider => {
            slider.addEventListener('input', (e) => {
                const valueLabel = e.target.parentElement.querySelector('.text-secondary');
                if (valueLabel) valueLabel.textContent = `${e.target.value}%`;
            });
        });

        // Tab switching logic (aesthetic only)
        const tabs = document.querySelectorAll('nav button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('bg-primary/10', 'border', 'border-primary/20', 'text-primary');
                    t.classList.add('text-outline');
                });
                tab.classList.add('bg-primary/10', 'border', 'border-primary/20', 'text-primary');
                tab.classList.remove('text-outline');
            });
        });
    </script>
</body></html>
