<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Manrope:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --glass-fill: rgba(255, 255, 255, 0.04);
            --glass-stroke: rgba(255, 255, 255, 0.12);
        }
        body {
            background: radial-gradient(circle at 50% 0%, #1A1F4B 0%, #0e1323 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .orb-pulse {
            animation: orb-float 8s ease-in-out infinite;
        }
        @keyframes orb-float {
            0%, 100% { transform: translateY(0) scale(1); filter: blur(40px) brightness(1); }
            50% { transform: translateY(-20px) scale(1.1); filter: blur(60px) brightness(1.2); }
        }
        .glow-mesh {
            background: radial-gradient(circle at 30% 30%, #c9bfff 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, #8fd8ff 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #B388FF 0%, transparent 50%);
            filter: blur(40px);
            opacity: 0.6;
        }
        .button-glow:active {
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.4);
        }
        .glass-card {
            background: var(--glass-fill);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-stroke);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#004d67",
                        "tertiary-container": "#d57a1e",
                        "outline-variant": "#484555",
                        "on-secondary": "#003548",
                        "surface-gradient-end": "#1A1F4B",
                        "error": "#ffb4ab",
                        "on-primary-container": "#28008a",
                        "on-primary-fixed": "#1a0063",
                        "secondary-fixed": "#c2e8ff",
                        "surface-container": "#1a1f30",
                        "on-background": "#dee1f9",
                        "glass-fill": "rgba(255, 255, 255, 0.04)",
                        "surface-container-lowest": "#080d1d",
                        "primary-fixed": "#e5deff",
                        "secondary-fixed-dim": "#75d1ff",
                        "primary-fixed-dim": "#c9bfff",
                        "tertiary": "#ffb77d",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "background": "#0e1323",
                        "surface-variant": "#2f3446",
                        "on-tertiary-container": "#432100",
                        "surface-gradient-start": "#0B1020",
                        "surface": "#0e1323",
                        "surface-container-high": "#25293a",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#2f1500",
                        "glass-stroke": "rgba(255, 255, 255, 0.12)",
                        "inverse-primary": "#5d3fe0",
                        "surface-dim": "#0e1323",
                        "primary-container": "#917eff",
                        "surface-tint": "#c9bfff",
                        "accent-glow": "#B388FF",
                        "tertiary-fixed": "#ffdcc3",
                        "secondary-container": "#00c1fd",
                        "surface-gradient-mid": "#121A35",
                        "surface-bright": "#34394a",
                        "on-secondary-container": "#004b65",
                        "inverse-surface": "#dee1f9",
                        "surface-container-low": "#161b2b",
                        "primary": "#c9bfff",
                        "secondary": "#8fd8ff",
                        "on-secondary-fixed": "#001e2b",
                        "on-primary-fixed-variant": "#441cc8",
                        "on-surface-variant": "#c9c4d8",
                        "on-tertiary": "#4d2600",
                        "outline": "#928ea1",
                        "on-surface": "#dee1f9",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-primary": "#2e009c",
                        "inverse-on-surface": "#2b3041",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "surface-container-highest": "#2f3446"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-lg": "40px",
                        "stack-sm": "12px",
                        "base": "8px",
                        "stack-md": "24px",
                        "container-margin": "20px"
                    },
                    "fontFamily": {
                        "display-lg": ["Sora"],
                        "body-md": ["Manrope"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-lg": ["Sora"],
                        "title-md": ["Sora"],
                        "headline-lg-mobile": ["Sora"],
                        "caption": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                        "caption": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "body-lg": ["17px", {"lineHeight": "26px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-between py-12 px-container-margin overflow-hidden bg-background">
<!-- Top Glow Accent -->
<div class="fixed top-[-100px] left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary opacity-20 blur-[100px] pointer-events-none"></div>
<!-- Neural Orb Hero Section -->
<div class="relative w-full flex justify-center items-center mt-8">
<!-- Background Blur/Glow for Orb -->
<div class="absolute w-72 h-72 rounded-full bg-accent-glow opacity-30 blur-[60px] orb-pulse"></div>
<!-- The Core Orb -->
<div class="relative w-64 h-64 rounded-full overflow-hidden glass-card flex items-center justify-center">
<!-- Simulated Neural Mesh Animation -->
<div class="absolute inset-0 glow-mesh animate-pulse"></div>
<!-- Reference Orb Visual -->
<div class="w-full h-full relative z-10 flex items-center justify-center opacity-80">
<span class="material-symbols-outlined text-primary text-[80px] filter drop-shadow-[0_0_20px_rgba(179,136,255,0.8)]" style="font-variation-settings: 'FILL' 1;">
                    auto_awesome
                </span>
</div>
<!-- Rotating Inner Stroke -->
<div class="absolute inset-0 border-[0.5px] border-white opacity-20 rounded-full scale-95"></div>
<div class="absolute inset-0 border-[0.5px] border-primary opacity-10 rounded-full scale-90"></div>
</div>
</div>
<!-- Content Card -->
<div class="w-full space-y-stack-md z-20">
<div class="flex flex-col gap-base items-center text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                Meet Your AI Companion
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px]">
                Aura evolves with you, providing deeply empathetic and futuristic digital support.
            </p>
</div>
<!-- Features Bento Cards -->
<div class="grid grid-cols-2 gap-4">
<div class="glass-card p-4 rounded-xl flex flex-col gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">psychology</span>
<span class="font-label-caps text-label-caps text-secondary">ADAPTIVE</span>
<p class="font-caption text-caption text-on-surface-variant leading-tight">Learns from your nuances.</p>
</div>
<div class="glass-card p-4 rounded-xl flex flex-col gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<span class="font-label-caps text-label-caps text-tertiary">SECURE</span>
<p class="font-caption text-caption text-on-surface-variant leading-tight">Private-by-design architecture.</p>
</div>
</div>
</div>
<!-- Interaction Area -->
<div class="w-full flex flex-col items-center gap-stack-md z-20">
<!-- Pagination Dots -->
<div class="flex gap-2">
<div class="w-8 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(179,136,255,0.6)]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
</div>
<!-- The Aura Button (CTA) -->
<button class="group relative w-full h-14 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center gap-2 overflow-hidden button-glow transition-all active:scale-95 duration-200">
<!-- Animated inner glow line -->
<div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity bg-[radial-gradient(circle_at_var(--x)_var(--y),rgba(255,255,255,0.4),transparent_50%)]"></div>
<span class="font-title-md text-title-md text-on-primary-container z-10">Next</span>
<span class="material-symbols-outlined text-on-primary-container z-10">arrow_forward</span>
</button>
</div>
<!-- Bottom Indicator -->
<div class="w-32 h-1 bg-on-surface opacity-10 rounded-full fixed bottom-2"></div>
<script>
        // Micro-interaction for the button hover light-leak effect
        const btn = document.querySelector('.group');
        btn.addEventListener('mousemove', (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            btn.style.setProperty('--x', `${x}px`);
            btn.style.setProperty('--y', `${y}px`);
        });

        // Simple orb pulse variance
        const orb = document.querySelector('.orb-pulse');
        setInterval(() => {
            const randomOpacity = 0.2 + Math.random() * 0.2;
            orb.style.opacity = randomOpacity;
        }, 3000);
    </script>
</body></html>
