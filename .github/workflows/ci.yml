name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura_secret
          POSTGRES_DB: aura_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U aura -d aura_ai
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @aura/shared run build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://aura:aura_secret@localhost:5432/aura_ai
          CLERK_SECRET_KEY: sk_test_dummy
          CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_WEBHOOK_SECRET: whsec_dummy
          OPENAI_API_KEY: sk-dummy
          GROQ_API_KEY: gsk_dummy
          REVENUECAT_WEBHOOK_SECRET: whsec_dummy
          BANNED_IDENTITY_PEPPER: test-pepper-do-not-use

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Check formatting
        run: pnpm exec prettier --check .
        continue-on-error: true
