version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura_secret
      POSTGRES_DB: aura_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://aura:aura_secret@db:5432/aura_ai"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-in-production}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PREMIUM_PRICE_ID: "${STRIPE_PREMIUM_PRICE_ID:-price_premium_monthly}"
      APP_URL: "${APP_URL:-http://localhost:8081}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
