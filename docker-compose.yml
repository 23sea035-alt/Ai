services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura_secret
      POSTGRES_DB: aura_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://aura:aura_secret@db:5432/aura_ai"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-}"
      CLERK_PUBLISHABLE_KEY: "${CLERK_PUBLISHABLE_KEY:-}"
      CLERK_WEBHOOK_SECRET: "${CLERK_WEBHOOK_SECRET:-}"
      REVENUECAT_WEBHOOK_SECRET: "${REVENUECAT_WEBHOOK_SECRET:-}"
      BANNED_IDENTITY_PEPPER: "${BANNED_IDENTITY_PEPPER:-}"
      APP_URL: "${APP_URL:-http://localhost:8081}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
