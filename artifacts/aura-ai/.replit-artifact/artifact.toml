kind = "mobile"
previewPath = "/mobile/"
title = "Aura AI - Companion App"
version = "1.0.0"
id = "artifacts/aura-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21174

[services.development]
run = "pnpm --filter @workspace/aura-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aura-ai", "run", "serve" ]

[services.env]
PORT = "21174"
BASE_PATH = "/mobile/"
