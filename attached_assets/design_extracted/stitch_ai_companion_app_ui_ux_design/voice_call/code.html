<!-- STITCH_SHADER_START:ANIMATION_2 class="absolute inset-0 w-full h-full scale-125 md:scale-150" -->
<div class="absolute inset-0 w-full h-full scale-125 md:scale-150" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

void main() {
    vec2 uv = (v_texCoord * 2.0 - 1.0) * u_resolution.xy / min(u_resolution.x, u_resolution.y);
    
    // Core glow
    float dist = length(uv);
    float orb = smoothstep(0.8, 0.0, dist);
    
    // Pulsing and internal "neural" activity
    float pulse = 0.1 * sin(u_time * 2.0);
    float ring = 0.01 / abs(dist - (0.5 + pulse));
    
    // Swirling colors
    vec3 color1 = vec3(0.48, 0.38, 1.0); // Purple #7B61FF
    vec3 color2 = vec3(0.0, 0.76, 1.0); // Blue #00C2FF
    
    float noise = sin(uv.x * 5.0 + u_time) * cos(uv.y * 5.0 - u_time);
    vec3 mixedColor = mix(color1, color2, 0.5 + 0.5 * sin(u_time + noise));
    
    vec3 finalColor = mixedColor * (orb + ring * 0.5);
    finalColor += 0.2 * vec3(0.7, 0.5, 1.0) / dist; // Outer glow
    
    gl_FragColor = vec4(finalColor, orb * 0.8 + ring);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        // Simple Micro-interaction: Waveform Animation
        const waveformContainer = document.getElementById('waveform-container');
        const barCount = 40;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-1 bg-gradient-to-t from-primary/60 to-secondary rounded-full';
            bar.style.height = '10px';
            waveformContainer.appendChild(bar);
            bars.push(bar);
        }

        function animateWaveform() {
            bars.forEach((bar, index) => {
                // Simulate voice activity with random sin waves
                const frequency = 0.2;
                const time = Date.now() / 150;
                const baseHeight = 8;
                const noise = Math.random() * 15;
                const wave = Math.sin(time + index * frequency) * 15 + 20;
                
                // Pulsing effect based on random "voice" activity
                const height = baseHeight + (wave * (0.5 + Math.random() * 0.5));
                bar.style.height = `${Math.max(4, height)}px`;
            });
            requestAnimationFrame(animateWaveform);
        }

        animateWaveform();

        // Button interaction feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Add a haptic feedback feel if supported
                if ('vibrate' in navigator) {
                    navigator.vibrate(50);
                }
            });
        });
    </script>
