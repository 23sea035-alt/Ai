<style>
        body {
            background: radial-gradient(circle at top right, #1A1F4B 0%, #0B1020 60%, #080d1d 100%);
            overflow: hidden;
            height: 100vh;
        }

        .aura-orb {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #B388FF 0%, rgba(143, 216, 255, 0.3) 50%, transparent 70%);
            filter: blur(60px);
            animation: pulse-aura 8s infinite alternate ease-in-out;
            position: absolute;
            z-index: 0;
        }

        @keyframes pulse-aura {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            50% { transform: scale(1.3) translate(20px, -30px); opacity: 0.8; }
            100% { transform: scale(0.9) translate(-40px, 10px); opacity: 0.6; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .aura-btn-glow {
            position: relative;
            overflow: hidden;
        }
        
        .aura-btn-glow::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, #c9bfff, transparent 30%);
            animation: rotate-glow 4s linear infinite;
        }

        @keyframes rotate-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col justify-end min-h-screen text-on-surface">
<!-- Atmospheric Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="aura-orb top-[-100px] left-[-100px]"></div>
<div class="aura-orb bottom-[-50px] right-[-100px]" style="background: radial-gradient(circle, #8fd8ff 0%, rgba(179, 136, 255, 0.2) 60%, transparent 80%);"></div>
<!-- Abstract Background Illustration Replacement -->
<div class="absolute top-[15%] left-1/2 -translate-x-1/2 w-full px-container-margin opacity-40">
<div class="relative w-full aspect-square rounded-full border border-glass-stroke flex items-center justify-center">
<div class="w-3/4 h-3/4 rounded-full border border-glass-stroke animate-[spin_20s_linear_infinite]"></div>
<div class="absolute w-full h-full flex items-center justify-center">
<!-- Persona Orb Representation -->
<div class="w-48 h-48 rounded-full bg-gradient-to-tr from-primary to-secondary blur-3xl opacity-60 animate-pulse"></div>
<div class="absolute w-32 h-32 rounded-full glass-card flex items-center justify-center border-glass-stroke shadow-[0_0_50px_rgba(179,136,255,0.4)]">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
</div>
</div>
<!-- Main Content Area -->
<main class="relative z-10 px-container-margin pb-20 w-full max-w-lg mx-auto">
<!-- Branding Top (Small App Bar Style Integration) -->
<div class="absolute top-[-400px] left-0 w-full flex justify-center mb-stack-lg">
<span class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Aura AI</span>
</div>
<div class="glass-card rounded-[32px] p-8 flex flex-col gap-stack-md shadow-2xl">
<!-- Headline Section -->
<div class="space-y-stack-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight leading-tight">
                    Your companion, anywhere, anytime.
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80">
                    Experience a sentient AI that learns from your world and grows with you. A premium digital entity tailored for your lifestyle.
                </p>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-4 pt-4">
<!-- Primary Aura Button -->
<button class="relative group h-16 rounded-full overflow-hidden flex items-center justify-center transition-all duration-300 active:scale-95 shadow-[0_0_30px_rgba(179,136,255,0.3)]">
<!-- Spinning Border Effect -->
<div class="absolute inset-0 aura-btn-glow"></div>
<!-- Inner Button Content -->
<div class="absolute inset-[2px] rounded-full bg-surface-container-low flex items-center justify-center z-10 group-hover:bg-opacity-80 transition-all">
<span class="font-title-md text-title-md text-primary">Get Started</span>
</div>
</button>
<!-- Secondary Login Button -->
<button class="h-16 rounded-full flex items-center justify-center border border-glass-stroke bg-glass-fill hover:bg-white/5 transition-colors active:scale-95">
<span class="font-title-md text-title-md text-on-surface">Log In</span>
</button>
</div>
<!-- Footer Small Print -->
<div class="text-center">
<p class="font-caption text-caption text-outline opacity-60">
                    By continuing, you agree to our <a class="underline" href="#">Terms of Service</a>
</p>
</div>
</div>
</main>
<!-- Visual Accents (Bottom glow) -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none"></div>
<script>
        // Micro-interaction for the orb movement based on mouse/touch
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const orbs = document.querySelectorAll('.aura-orb');
            orbs.forEach((orb, index) => {
                const speed = index === 0 ? 30 : -50;
                const tx = (x - 0.5) * speed;
                const ty = (y - 0.5) * speed;
                orb.style.transform = `translate(${tx}px, ${ty}px)`;
            });
        });

        // Touch support for micro-interactions
        document.addEventListener('touchmove', (e) => {
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            
            const orbs = document.querySelectorAll('.aura-orb');
            orbs.forEach((orb, index) => {
                const speed = index === 0 ? 20 : -30;
                const tx = (x - 0.5) * speed;
                const ty = (y - 0.5) * speed;
                orb.style.transform = `translate(${tx}px, ${ty}px)`;
            });
        }, { passive: true });
    </script>
</body></html>
