<style>
        body {
            background-color: #0B1020;
            overflow: hidden;
        }

        .splash-gradient {
            background: radial-gradient(circle at center, #121A35 0%, #0B1020 100%);
        }

        .breathing {
            animation: breath 8s ease-in-out infinite;
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.85; filter: blur(0px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(4px); }
        }

        .fade-in-up {
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .orb-glow {
            box-shadow: 0 0 80px rgba(179, 136, 255, 0.15), 
                        inset 0 0 40px rgba(143, 216, 255, 0.1);
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: floatParticle 10s linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        .aura-logo-text {
            background: linear-gradient(135deg, #c9bfff 0%, #8fd8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

      min-height: max(884px, 100dvh);

<body class="splash-gradient flex items-center justify-center min-h-screen relative">
<!-- Particle Background -->
<div class="absolute inset-0 z-0 overflow-hidden" id="particle-container"></div>
<!-- Background Ambient Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary/10 blur-[120px] pointer-events-none"></div>
<!-- Main Content Shell -->
<main class="relative z-10 flex flex-col items-center justify-center w-full px-container-margin">
<!-- The Central Neural Orb -->
<div class="relative w-64 h-64 md:w-80 md:h-80 mb-stack-lg flex items-center justify-center fade-in-up" style="animation-delay: 0.2s;">
<!-- Outer Ring Glow -->
<div class="absolute inset-0 rounded-full orb-glow breathing bg-glass-fill border border-glass-stroke"></div>
<!-- WebGL Shader Centerpiece -->
<div class="w-full h-full relative z-20 overflow-hidden rounded-full">
<!-- STITCH_SHADER_START:ANIMATION_2 class="absolute inset-0 w-full h-full scale-125" -->
<div class="absolute inset-0 w-full h-full scale-125" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

void main() {
    vec2 uv = (v_texCoord * 2.0 - 1.0) * u_resolution.xy / min(u_resolution.x, u_resolution.y);
    
    // Core glow
    float dist = length(uv);
    float orb = smoothstep(0.8, 0.0, dist);
    
    // Pulsing and internal "neural" activity
    float pulse = 0.1 * sin(u_time * 2.0);
    float ring = 0.01 / abs(dist - (0.5 + pulse));
    
    // Swirling colors
    vec3 color1 = vec3(0.48, 0.38, 1.0); // Purple #7B61FF
    vec3 color2 = vec3(0.0, 0.76, 1.0); // Blue #00C2FF
    
    float noise = sin(uv.x * 5.0 + u_time) * cos(uv.y * 5.0 - u_time);
    vec3 mixedColor = mix(color1, color2, 0.5 + 0.5 * sin(u_time + noise));
    
    vec3 finalColor = mixedColor * (orb + ring * 0.5);
    finalColor += 0.2 * vec3(0.7, 0.5, 1.0) / dist; // Outer glow
    
    gl_FragColor = vec4(finalColor, orb * 0.8 + ring);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
</div>

<div class="mt-stack-lg flex flex-col items-center fade-in-up" style="animation-delay: 1.2s;">
<div class="w-48 h-[2px] bg-glass-stroke rounded-full overflow-hidden relative">
<div class="absolute left-0 top-0 h-full bg-gradient-to-r from-primary to-secondary w-0 transition-all duration-[3000ms] ease-out" id="loading-bar"></div>
</div>
<span class="mt-4 font-caption text-caption text-outline-variant tracking-wider uppercase" id="loading-text">Synchronizing Neural Links</span>
</div>
</main>
<!-- Bottom Attribution -->
<div class="absolute bottom-8 w-full flex justify-center fade-in-up" style="animation-delay: 1.6s;">
<p class="font-caption text-caption text-outline opacity-40">
            Powered by Luminous Intelligence
        </p>
</div>
<script>
        // Particle Generation
        const container = document.getElementById('particle-container');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Random styling
            const size = Math.random() * 3 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // Random position
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100 + 100}%`;
            
            // Random animation delay and duration
            const duration = Math.random() * 8 + 10;
            const delay = Math.random() * 10;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${delay}s`;
            
            // Random opacity
            particle.style.opacity = Math.random() * 0.3 + 0.1;
            
            container.appendChild(particle);
        }

        // Loading Bar Simulation
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            
            setTimeout(() => {
                bar.style.width = '100%';
            }, 500);

            const statusTexts = [
                "Synchronizing Neural Links",
                "Calibrating Aura Field",
                "Initializing Personality Matrix",
                "Establishing Luminous Stream"
            ];
            
            let index = 0;
            const textInterval = setInterval(() => {
                index++;
                if (index < statusTexts.length) {
                    text.style.opacity = '0';
                    setTimeout(() => {
                        text.innerText = statusTexts[index];
                        text.style.opacity = '1';
                    }, 500);
                } else {
                    clearInterval(textInterval);
                    text.innerText = "Welcome back";
                }
            }, 1200);
        });

        // Mouse move parallax effect for the orb
        document.addEventListener('mousemove', (e) => {
            const orb = document.querySelector('.orb-glow').parentElement;
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            orb.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
