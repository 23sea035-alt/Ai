<style>
        body {

            color: #dee1f9;
        }

        .ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;

        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .aura-glow {
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.2);
        }

        .button-glow {
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.4);
            transition: all 0.3s ease;
        }

        .button-glow:active {
            transform: scale(0.96);
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.2);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .border-flow {
            position: relative;
            overflow: hidden;
        }

        .border-flow::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 70%, #c9bfff, transparent 100%);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {

<body class="flex flex-col items-center justify-center font-body-md text-body-md">
<!-- Ambient Particles Canvas -->
<canvas class="ambient-canvas" id="ambient-particles"></canvas>
<!-- Top Navigation Anchor (Suppressing Main Shell for Transactional Context) -->
<header class="fixed top-0 w-full flex items-center justify-between px-container-margin h-16 z-50">
<button class="flex items-center justify-center w-10 h-10 rounded-full glass-panel active:scale-90 transition-transform" onclick="history.back()">

</button>
<div class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent opacity-40">Aura</div>
<div class="w-10"></div>
</header>
<main class="relative z-10 w-full max-w-[400px] px-container-margin flex flex-col items-center">
<!-- Persona Orb Animation -->
<div class="w-24 h-24 mb-stack-lg relative animate-float">
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary to-secondary opacity-20 blur-xl"></div>
<div class="relative w-full h-full rounded-full border border-glass-stroke glass-panel flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-primary/10"></div>
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
</div>
<!-- Typography -->
<div class="text-center mb-stack-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Forgot Password?</h1>
<p class="text-on-surface-variant font-body-md px-4">Enter your email address and we'll send you a luminous link to reset your identity.</p>
</div>
<!-- Form Card -->
<div class="w-full glass-panel rounded-xl p-6 space-y-stack-md aura-glow">
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-outline ml-1" for="email">EMAIL ADDRESS</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">alternate_email</span>
</div>

</div>
</div>

</div>

<span class="material-symbols-outlined text-[16px]">login</span>

</a>

<!-- Footer Visual Elements -->
<div class="fixed bottom-12 w-full flex justify-center opacity-30 pointer-events-none">
<div class="w-64 h-[1px] bg-gradient-to-r from-transparent via-glass-stroke to-transparent"></div>
</div>
<script>
        // Ambient Particle Background Animation
        const canvas = document.getElementById('ambient-particles');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles;
        
        const particleCount = 40;
        const colors = ['#c9bfff', '#8fd8ff', '#B388FF'];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            particles = [];

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();
                
                // Add soft glow to particles
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
            });
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();

        // Micro-interaction for button
        const btn = document.querySelector('.button-glow');
        btn.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'absolute bg-white/20 rounded-full animate-ping pointer-events-none';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.left = (e.clientX - 50) + 'px';
            ripple.style.top = (e.clientY - 50) + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1000);
        });
    </script>
