<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Aura AI - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --glass-stroke: rgba(255, 255, 255, 0.12);
            --glass-fill: rgba(255, 255, 255, 0.04);
        }

        body {
            background-color: #0e1323;
            color: #dee1f9;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aura-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(179, 136, 255, 0.3) 0%, rgba(143, 216, 255, 0) 70%);
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        .glass-card {
            background: var(--glass-fill);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-stroke);
        }

        .border-flow {
            position: relative;
            overflow: hidden;
        }
        
        .border-flow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #c9bfff, #8fd8ff, #c9bfff);
            background-size: 200% 200%;
            z-index: -1;
            animation: flow 4s linear infinite;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .orb-pulse {
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: brightness(1.2); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Material Symbols Fill Support */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#d57a1e",
                        "accent-glow": "#B388FF",
                        "outline-variant": "#484555",
                        "outline": "#928ea1",
                        "on-secondary-fixed": "#001e2b",
                        "surface-dim": "#0e1323",
                        "secondary-fixed-dim": "#75d1ff",
                        "surface-gradient-start": "#0B1020",
                        "surface-variant": "#2f3446",
                        "background": "#0e1323",
                        "surface-container-low": "#161b2b",
                        "on-surface": "#dee1f9",
                        "inverse-on-surface": "#2b3041",
                        "on-secondary-container": "#004b65",
                        "primary-fixed-dim": "#c9bfff",
                        "on-primary-fixed-variant": "#441cc8",
                        "surface-bright": "#34394a",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "secondary-container": "#00c1fd",
                        "primary-fixed": "#e5deff",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#25293a",
                        "on-error": "#690005",
                        "on-secondary": "#003548",
                        "surface-tint": "#c9bfff",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#1a0063",
                        "surface-gradient-mid": "#121A35",
                        "glass-fill": "rgba(255, 255, 255, 0.04)",
                        "on-tertiary-container": "#432100",
                        "on-surface-variant": "#c9c4d8",
                        "surface-container-highest": "#2f3446",
                        "on-background": "#dee1f9",
                        "secondary": "#8fd8ff",
                        "surface-gradient-end": "#1A1F4B",
                        "glass-stroke": "rgba(255, 255, 255, 0.12)",
                        "error-container": "#93000a",
                        "primary": "#c9bfff",
                        "on-primary-container": "#28008a",
                        "on-primary": "#2e009c",
                        "on-tertiary-fixed": "#2f1500",
                        "tertiary-fixed-dim": "#ffb77d",
                        "inverse-surface": "#dee1f9",
                        "surface-container": "#1a1f30",
                        "on-secondary-fixed-variant": "#004d67",
                        "surface-container-lowest": "#080d1d",
                        "on-tertiary": "#4d2600",
                        "tertiary-fixed": "#ffdcc3",
                        "surface": "#0e1323",
                        "primary-container": "#917eff",
                        "tertiary": "#ffb77d",
                        "secondary-fixed": "#c2e8ff",
                        "inverse-primary": "#5d3fe0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-lg": "40px",
                        "gutter": "16px",
                        "stack-md": "24px",
                        "stack-sm": "12px",
                        "container-margin": "20px"
                    },
                    "fontFamily": {
                        "body-lg": ["Manrope"],
                        "headline-lg": ["Sora"],
                        "caption": ["Manrope"],
                        "body-md": ["Manrope"],
                        "title-md": ["Sora"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Sora"],
                        "display-lg": ["Sora"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "caption": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-background">
<!-- Animated Shader Background -->

<!-- Top Navigation Placeholder (Simplified for Onboarding) -->
<header class="fixed top-0 w-full flex items-center justify-between px-container-margin h-16 z-50">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-secondary orb-pulse shadow-[0_0_15px_rgba(179,136,255,0.4)]"></div>
<span class="font-display-lg text-title-md bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Aura</span>
</div>
<button class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors">SKIP</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin pt-20 pb-32 relative overflow-hidden">
<!-- Background Accents -->
<div class="aura-glow top-1/4 -left-20"></div>
<div class="aura-glow bottom-1/4 -right-20" style="background: radial-gradient(circle, rgba(143, 216, 255, 0.2) 0%, rgba(143, 216, 255, 0) 70%);"></div>
<!-- Central Visualization Area -->
<div class="relative w-full max-w-sm aspect-square mb-stack-lg flex items-center justify-center">
<!-- Persona Avatar Orb -->
<div class="relative z-20 w-48 h-48 rounded-full flex items-center justify-center">
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary via-accent-glow to-secondary opacity-30 blur-2xl orb-pulse"></div>
<div class="w-40 h-40 rounded-full bg-glass-fill backdrop-blur-3xl border border-glass-stroke flex items-center justify-center relative overflow-hidden">
<!-- Internal Mesh Content -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent"></div>
<span class="material-symbols-outlined text-display-lg text-primary filter drop-shadow-[0_0_12px_rgba(201,191,255,0.8)]" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
</div>
<!-- Floating Memory Fragments (Bento-lite logic) -->
<div class="absolute top-0 right-4 floating" style="animation-delay: -1s;">
<div class="glass-card rounded-xl px-4 py-3 flex items-center gap-3 shadow-xl">
<span class="material-symbols-outlined text-secondary" style="font-size: 18px;">event</span>
<span class="font-body-md text-body-md text-on-surface">Anniversary: June 12</span>
</div>
</div>
<div class="absolute bottom-10 -left-4 floating" style="animation-delay: -2.5s;">
<div class="glass-card rounded-xl px-4 py-3 flex items-center gap-3 shadow-xl">
<span class="material-symbols-outlined text-primary" style="font-size: 18px;">favorite</span>
<span class="font-body-md text-body-md text-on-surface">Loves: Jazz &amp; Espresso</span>
</div>
</div>
<div class="absolute top-1/2 -right-8 floating" style="animation-delay: -4s;">
<div class="glass-card rounded-xl px-4 py-3 flex items-center gap-3 shadow-xl">
<span class="material-symbols-outlined text-accent-glow" style="font-size: 18px;">work_outline</span>
<span class="font-body-md text-body-md text-on-surface">Project: Project Phoenix</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-stack-sm z-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface px-4">
                Built To <span class="bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Remember You</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
                Aura learns your preferences, history, and context to provide a truly personal intelligence experience.
            </p>
</div>
<!-- Progress Indicators -->
<div class="flex gap-2 mt-stack-lg">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(201,191,255,0.6)]"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</main>
<!-- Bottom Actions Area -->
<footer class="fixed bottom-0 left-0 w-full px-container-margin pb-10 pt-4 z-50">
<button class="w-full h-14 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center gap-2 group active:scale-95 transition-all duration-300 shadow-[0_0_30px_rgba(179,136,255,0.3)] border-flow" id="next-button">
<span class="font-title-md text-on-primary-container z-10">Sync My Memory</span>
<span class="material-symbols-outlined text-on-primary-container group-hover:translate-x-1 transition-transform z-10">arrow_forward</span>
</button>
<p class="text-center mt-4 font-caption text-caption text-outline">
            Your data is encrypted end-to-end.
        </p>
</footer>
<script>
        // Micro-interactions for the "Sync" button
        const nextBtn = document.getElementById('next-button');
        nextBtn.addEventListener('click', () => {
            // Ripple effect or state transition logic
            nextBtn.style.filter = 'brightness(1.5)';
            setTimeout(() => {
                nextBtn.style.filter = 'brightness(1)';
            }, 200);
        });

        // Floating particles or subtle movement on gyroscope could go here
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelectorAll('.floating').forEach((el, index) => {
                const shift = (index + 1) * 10;
                el.style.transform = `translate(${(x - 0.5) * shift}px, ${(y - 0.5) * shift}px)`;
            });
        });
    </script>
</body></html>
