<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aura — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #0c0c0f; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  input, button, select, textarea { font-family: inherit; }
  @keyframes aura-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes aura-rise-sm { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes aura-spin { to { transform: rotate(360deg); } }
  @keyframes aura-blink { 0%, 45% { opacity: 1; } 55%, 100% { opacity: 0; } }
  .aura-enter { animation: aura-rise .8s cubic-bezier(.16,1,.3,1) both; }
  .aura-stagger > * { animation: aura-rise-sm .5s cubic-bezier(.2,.7,.2,1) both; }
  .aura-stagger > *:nth-child(1) { animation-delay: .04s; }
  .aura-stagger > *:nth-child(2) { animation-delay: .10s; }
  .aura-stagger > *:nth-child(3) { animation-delay: .16s; }
  .aura-stagger > *:nth-child(4) { animation-delay: .22s; }
  .aura-stagger > *:nth-child(5) { animation-delay: .28s; }
  .aura-spin { animation: aura-spin .8s linear infinite; }
  .aura-press { transition: transform .12s cubic-bezier(.2,.7,.2,1); }
  .aura-press:active { transform: scale(.975); }
  @keyframes aura-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes aura-sink { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
  @keyframes aura-ripple { 0% { transform: scale(.34); opacity: 0; } 18% { opacity: .8; } 100% { transform: scale(1.18); opacity: 0; } }
  @keyframes aura-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
  .aura-float { animation: aura-float 7s ease-in-out infinite; }
  .aura-ripple { transform-origin: 104px 132px; animation: aura-ripple 5.5s cubic-bezier(.33,0,.2,1) infinite; }
  .aura-pulse { animation: aura-pulse 3.6s ease-in-out infinite; }
  @keyframes mark-honey-in { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes mark-wine-in { from { opacity: 0; transform: translate(-6%, -4%) scale(.94) rotate(-4deg); } to { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } }
  @keyframes mark-fade { from { opacity: 0; } to { opacity: 1; } }
  #honey { transform-box: fill-box; transform-origin: center; animation: mark-honey-in .4s cubic-bezier(.16,1,.3,1) both; }
  #wine  { transform-box: fill-box; transform-origin: center; animation: mark-wine-in .95s cubic-bezier(.16,1.04,.3,1) .25s both; }
  @media (prefers-reduced-motion: reduce) {
    #honey, #wine { animation: mark-fade .4s ease both !important; transform: none !important; }
  }
  @keyframes aura-fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ribbon-draw { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes seed-ride { from { offset-distance: 0%; } to { offset-distance: 56%; } }
  @keyframes shelter-cup { from { clip-path: inset(100% 0 0 0); -webkit-clip-path: inset(100% 0 0 0); } to { clip-path: inset(0 0 0 0); -webkit-clip-path: inset(0 0 0 0); } }
  @keyframes shelter-deepen { from { opacity: .34; } to { opacity: .68; } }
  @keyframes bubble-settle { from { opacity: 0; transform: translateY(16px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .aura-fade { animation: aura-fadein .32s ease both; }
  .aura-caret { display: inline-block; width: 2px; height: 1.05em; vertical-align: -0.15em; margin-left: 2px; border-radius: 2px; background: currentColor; animation: aura-blink 1.05s steps(1) infinite; }
  @media (prefers-reduced-motion: reduce) {
    .aura-enter, .aura-stagger > *, .aura-spin, .aura-caret,
    .aura-float, .aura-ripple, .aura-pulse, .aura-fade { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="tokens.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="dev-harness.jsx"></script>
<script type="text/babel" src="onboarding-app.jsx"></script>
</body>
</html>
